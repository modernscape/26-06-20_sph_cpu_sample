<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>26-06-20_sph_cpu_sample</title>
    <style>
      input {
        position: absolute;
        margin: 10px;
        padding: 2px 15px;
      }
      #msgSpan {
        position: absolute;
        color: #fff;
        right: 0;
        padding: 3px 10px;
        opacity: 0.8;
        font-family: serif;
        font-size: 24px;
      }
      /* .btn--yellow {
        color: #000;
        background-color: #fff100;
        border-bottom: 5px solid #ccc100;
      } */
    </style>
  </head>
  <body>
    <input type="button" value="add" id="addBtn" class="btn--yellow" />
    <span id="msgSpan"></span>
    <div id="app"></div>
    <script type="module" src="./main.js"></script>
    <script id="vertexShader" type="shader/x-vertex">
      precision mediump float;
      uniform mat4 projectionMatrix;
      uniform mat4 modelViewMatrix;

      attribute vec3 position;
      attribute vec3 instancePosition;

      void main() {
        vec3 finalPos = position + instancePosition;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(finalPos, 1.0);
        gl_PointSize = 2.0;
      }
    </script>
    <script id="fragmentShader" type="shader/x-fragment">
      precision mediump float;
      void main() {
        gl_FragColor = vec4(1.0, 0.0, 1.0, 1.0);
      }
    </script>
  </body>
</html>
